<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Reading Program 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:#f8f6f1;color:#2c2c2a;min-height:100vh}

.page-header{background:#fff;border-bottom:1px solid #e5e2db;padding:2rem 0 0;text-align:center}
.page-header h1{font-family:'DM Serif Display',serif;font-size:2rem;color:#2c2c2a;font-weight:400;letter-spacing:-0.5px}
.page-header p{font-size:0.95rem;color:#888780;margin-top:0.3rem}

.grade-tabs{display:flex;justify-content:center;gap:0;margin-top:1.5rem}
.gtab{font-size:0.9rem;font-weight:500;padding:0.7rem 1.8rem;background:transparent;border:none;border-bottom:3px solid transparent;color:#888780;cursor:pointer;transition:all 0.15s}
.gtab:hover{color:#2c2c2a;background:#f8f6f1}
.gtab.active{color:#1D9E75;border-bottom-color:#1D9E75}

.container{max-width:1100px;margin:0 auto;padding:1.5rem 1.5rem 3rem}

.principal-section{background:#fff;border:1px solid #FAC775;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.principal-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.principal-header i{font-size:22px;color:#BA7517}
.principal-header h2{font-family:'DM Serif Display',serif;font-size:1.2rem;font-weight:400;color:#633806}
.principal-header span{font-size:0.8rem;color:#854F0B;margin-left:auto;background:#FAEEDA;padding:4px 12px;border-radius:20px}
.pp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.pp-card{background:#fffcf5;border:1px solid #FAC775;border-radius:10px;padding:1rem;cursor:pointer;transition:all 0.15s;position:relative}
.pp-card:hover{border-color:#BA7517;transform:translateY(-1px)}
.pp-card.picked{border:2px solid #BA7517;background:#FFF3DB}
.pp-card .card-title{font-weight:600;font-size:0.9rem;color:#412402;line-height:1.35}
.pp-card .card-author{font-size:0.8rem;color:#854F0B;margin-top:3px}
.pp-card .card-summary{font-size:0.82rem;color:#633806;line-height:1.5;margin-top:8px}
.pp-card .pick-check{display:none}
.pp-card.picked .pick-check{display:flex;align-items:center;gap:4px;font-size:0.78rem;font-weight:600;color:#BA7517;margin-top:8px}

.controls-bar{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.search-box{position:relative;flex:1;min-width:200px}
.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:#b4b2a9}
.search-box input{width:100%;padding:10px 14px 10px 38px;border:1px solid #d3d1c7;border-radius:8px;font-size:0.9rem;font-family:inherit;background:#fff;transition:border-color 0.15s}
.search-box input:focus{outline:none;border-color:#1D9E75}
.filter-pill{font-size:0.82rem;font-weight:500;padding:7px 14px;border-radius:20px;border:1px solid #d3d1c7;background:#fff;color:#5f5e5a;cursor:pointer;transition:all 0.12s;white-space:nowrap}
.filter-pill:hover{border-color:#888780}
.filter-pill.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.book-count{font-size:0.82rem;color:#888780;margin-left:auto;white-space:nowrap}

.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.book-card{background:#fff;border:1px solid #e5e2db;border-radius:10px;padding:1.1rem 1.2rem;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;gap:4px}
.book-card:hover{border-color:#b4b2a9;transform:translateY(-1px)}
.book-card.picked{border:2px solid #1D9E75;background:#f0faf5}
.card-title{font-weight:600;font-size:0.92rem;color:#2c2c2a;line-height:1.35}
.card-author{font-size:0.82rem;color:#888780}
.genre-tag{display:inline-block;font-size:0.72rem;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:5px;width:fit-content;text-transform:uppercase;letter-spacing:0.5px}
.card-summary{font-size:0.84rem;color:#5f5e5a;line-height:1.55;margin-top:8px}
.pick-check{display:none}
.book-card.picked .pick-check{display:flex;align-items:center;gap:4px;font-size:0.78rem;font-weight:600;color:#1D9E75;margin-top:auto;padding-top:8px}

.genre-adventure .genre-tag{background:#E1F5EE;color:#085041}
.genre-fantasy .genre-tag{background:#EEEDFE;color:#3C3489}
.genre-animals .genre-tag{background:#FAEEDA;color:#633806}
.genre-history .genre-tag{background:#E6F1FB;color:#0C447C}
.genre-funny .genre-tag{background:#FBEAF0;color:#72243E}
.genre-classic .genre-tag{background:#F1EFE8;color:#444441}
.genre-nature .genre-tag{background:#EAF3DE;color:#27500A}
.genre-family .genre-tag{background:#FAECE7;color:#712B13}
.genre-science .genre-tag{background:#E6F1FB;color:#0C447C}
.genre-pp .genre-tag{background:#FAEEDA;color:#633806}

.picks-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e2db;padding:14px 24px;display:none;align-items:center;gap:14px;z-index:100}
.picks-footer.show{display:flex}
.picks-footer i{font-size:20px;color:#1D9E75}
.picks-footer .picks-text{font-size:0.9rem;color:#5f5e5a}
.picks-footer .picks-text strong{color:#2c2c2a}
.picks-footer .picks-names{flex:1;font-size:0.8rem;color:#888780;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.print-btn{font-size:0.85rem;font-weight:500;padding:8px 20px;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background 0.15s}
.print-btn:hover{background:#0F6E56}

.empty-state{text-align:center;padding:3rem 1rem;color:#888780}
.empty-state i{font-size:40px;display:block;margin-bottom:12px;color:#d3d1c7}
.empty-state p{font-size:0.95rem}

@media print{
.page-header,.controls-bar,.picks-footer,.grade-tabs{display:none!important}
.container{padding:0.5rem}
body{background:#fff}
.book-card,.pp-card{break-inside:avoid;border:1px solid #ccc!important;transform:none!important}
.book-card.picked,.pp-card.picked{border:2px solid #1D9E75!important}
.principal-section{break-inside:avoid}
}

@media(max-width:600px){
.page-header h1{font-size:1.5rem}
.gtab{padding:0.6rem 1rem;font-size:0.82rem}
.book-grid{grid-template-columns:1fr}
.pp-grid{grid-template-columns:1fr}
.container{padding:1rem}
}
</style>
</head>
<body>

<div class="page-header">
  <h1><i class="ti ti-book" style="font-size:28px;vertical-align:-4px;margin-right:8px;color:#1D9E75"></i>Summer Reading Program 2026</h1>
  <p>Choose your grade, explore the books, and pick your favorites!</p>
  <div class="grade-tabs" id="grade-tabs">
    <button class="gtab active" onclick="setGrade('prek')">Pre-K &amp; Kindergarten</button>
    <button class="gtab" onclick="setGrade('1st2nd')">1st &amp; 2nd Grade</button>
    <button class="gtab" onclick="setGrade('3rd5th')">3rd, 4th &amp; 5th Grade</button>
  </div>
</div>

<div class="container">
  <div class="principal-section" id="principal-section">
    <div class="principal-header">
      <i class="ti ti-star" aria-hidden="true"></i>
      <h2>Principal's picks</h2>
      <span>Specially chosen for you!</span>
    </div>
    <div class="pp-grid" id="pp-grid"></div>
  </div>

  <div class="controls-bar">
    <div class="search-box">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search" placeholder="Search titles or authors..." oninput="render()">
    </div>
    <div id="filter-pills"></div>
    <span class="book-count" id="book-count"></span>
  </div>

  <div class="book-grid" id="book-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none">
    <i class="ti ti-book-off"></i>
    <p>No books match your search. Try a different keyword!</p>
  </div>
</div>

<div class="picks-footer" id="picks-footer">
  <i class="ti ti-check" aria-hidden="true"></i>
  <span class="picks-text"><strong id="pick-count">0</strong> books picked</span>
  <span class="picks-names" id="pick-names"></span>
  <button class="print-btn" onclick="printPicks()"><i class="ti ti-printer" style="font-size:14px;vertical-align:-1px;margin-right:4px"></i>Print my picks</button>
</div>

let currentGrade='prek';
let activeFilter='all';
let picked=new Set();

function setGrade(g){
  currentGrade=g;
  activeFilter='all';
  document.getElementById('search').value='';
  document.querySelectorAll('.gtab').forEach((t,i)=>{
    t.classList.toggle('active',['prek','1st2nd','3rd5th'][i]===g);
  });
  buildFilters();
  render();
}

function buildFilters(){
  const books=DATA[currentGrade];
  const genres=new Set();
  books.forEach(b=>{if(!b.pp)genres.add(b.g)});
  const pills=document.getElementById('filter-pills');
  pills.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='filter-pill active';
  allBtn.textContent='All';
  allBtn.onclick=()=>{activeFilter='all';updateFilters();render()};
  pills.appendChild(allBtn);

  const ppBtn=document.createElement('button');
  ppBtn.className='filter-pill';
  ppBtn.textContent="Principal's picks";
  ppBtn.onclick=()=>{activeFilter='pp';updateFilters();render()};
  pills.appendChild(ppBtn);

  const order=['adventure','fantasy','animals','history','funny','family','nature','science','classic'];
  order.forEach(g=>{
    if(!genres.has(g))return;
    const btn=document.createElement('button');
    btn.className='filter-pill';
    btn.textContent=g.charAt(0).toUpperCase()+g.slice(1);
    btn.onclick=()=>{activeFilter=g;updateFilters();render()};
    pills.appendChild(btn);
  });
}

function updateFilters(){
  document.querySelectorAll('.filter-pill').forEach(p=>{
    const label=p.textContent.toLowerCase();
    const isActive=(activeFilter==='all'&&label==='all')||(activeFilter==='pp'&&label==="principal's picks")||(label===activeFilter);
    p.classList.toggle('active',isActive);
  });
}

function render(){
  const books=DATA[currentGrade];
  const query=document.getElementById('search').value.toLowerCase();
  const ppSection=document.getElementById('principal-section');
  const ppGrid=document.getElementById('pp-grid');
  const grid=document.getElementById('book-grid');
  const empty=document.getElementById('empty-state');

  const ppBooks=books.filter(b=>b.pp);
  const showPP=activeFilter==='all'||activeFilter==='pp';

  if(showPP&&ppBooks.length>0&&!query){
    ppSection.style.display='';
    ppGrid.innerHTML='';
    ppBooks.forEach(b=>{
      const key=currentGrade+':'+b.t;
      const isPicked=picked.has(key);
      const card=document.createElement('div');
      card.className='pp-card'+(isPicked?' picked':'');
      card.innerHTML=`<div class="card-title">${b.t}</div><div class="card-author">by ${b.a}</div><div class="card-summary">${b.s}</div><div class="pick-check"><i class="ti ti-check" aria-hidden="true"></i> Added to picks</div>`;
      card.onclick=()=>{togglePick(key);render()};
      ppGrid.appendChild(card);
    });
  } else {
    ppSection.style.display='none';
  }

  grid.innerHTML='';
  let count=0;
  books.forEach(b=>{
    if(activeFilter==='pp'&&!b.pp)return;
    if(activeFilter!=='all'&&activeFilter!=='pp'&&b.g!==activeFilter)return;
    if(query&&!b.t.toLowerCase().includes(query)&&!b.a.toLowerCase().includes(query)&&!b.s.toLowerCase().includes(query))return;
    count++;
    const key=currentGrade+':'+b.t;
    const isPicked=picked.has(key);
    const card=document.createElement('div');
    card.className='book-card genre-'+b.g+(isPicked?' picked':'');
    card.innerHTML=`<div class="card-title">${b.t}${b.pp?' <i class="ti ti-star" style="font-size:14px;color:#BA7517;vertical-align:-1px" aria-hidden="true"></i>':''}</div><div class="card-author">by ${b.a}</div><span class="genre-tag">${b.g}</span><div class="card-summary">${b.s}</div><div class="pick-check"><i class="ti ti-check" aria-hidden="true"></i> Added to picks</div>`;
    card.onclick=()=>{togglePick(key);render()};
    grid.appendChild(card);
  });

  document.getElementById('book-count').textContent=count+' book'+(count!==1?'s':'');
  empty.style.display=count===0?'':'none';
  updateFooter();
}

function togglePick(key){
  if(picked.has(key))picked.delete(key);
  else picked.add(key);
}

function updateFooter(){
  const footer=document.getElementById('picks-footer');
  if(picked.size===0){footer.classList.remove('show');return}
  footer.classList.add('show');
  document.getElementById('pick-count').textContent=picked.size;
  const names=[...picked].map(k=>k.split(':').slice(1).join(':')).join(', ');
  document.getElementById('pick-names').textContent=names;
}

function printPicks(){
  const titles=[...picked].map(k=>{
    const grade=k.split(':')[0];
    const title=k.split(':').slice(1).join(':');
    const gradeLabel={prek:'Pre-K/K','1st2nd':'1st-2nd','3rd5th':'3rd-5th'}[grade];
    const allBooks=[...DATA.prek,...DATA['1st2nd'],...DATA['3rd5th']];
    const book=allBooks.find(b=>b.t===title);
    return gradeLabel+': '+title+(book?' by '+book.a:'');
  });
  const w=window.open('','_blank');
  w.document.write('<html><head><title>My Summer Reading Picks</title><style>body{font-family:Georgia,serif;max-width:600px;margin:40px auto;padding:20px}h1{font-size:24px;margin-bottom:4px}p.sub{color:#888;margin-bottom:24px}li{font-size:16px;margin-bottom:8px;line-height:1.5}</style></head><body>');
  w.document.write('<h1>My Summer Reading Picks</h1><p class="sub">Summer 2026</p><ol>');
  titles.forEach(t=>w.document.write('<li>'+t+'</li>'));
  w.document.write('</ol></body></html>');
  w.document.close();
  w.print();
}

buildFilters();
render();
</script>
